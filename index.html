<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LandiEDC - BBL Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; overscroll-behavior-y: none; background-color: #f3f4f6; }
        .receipt-font { font-family: monospace; line-height: 1.2; font-size: 13px; color: black; }
        .loader { border-top-color: #1e3a8a; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #print-qr-area, #print-receipt-area { display: none; }
        @media print {
            @page { margin: 0; width: 58mm; }
            body { background: white; margin: 0; }
            #screen-keypad, #screen-qr, #screen-receipt, #screen-failed { display: none !important; }
            body.printing-qr #print-qr-area { display: block !important; width: 58mm; text-align: center; padding: 4mm 2mm; }
            body.printing-receipt #print-receipt-area { display: block !important; width: 58mm; padding: 4mm 2mm; }
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-gray-800 flex flex-col items-center">

    <div id="screen-keypad" class="flex flex-col h-full bg-white w-full max-w-md shadow-2xl relative z-10">
        <div class="bg-[#1e3a8a] text-white text-center py-5 shadow-lg">
            <h2 class="font-bold text-2xl tracking-widest uppercase">BBL Pay</h2>
        </div>
        <div class="px-8 py-10 flex flex-col justify-end items-end bg-gray-50 flex-none h-1/4 border-b">
            <span class="text-gray-400 font-medium mb-1 w-full text-left text-xs uppercase">จำนวนเงิน (THB)</span>
            <span id="amountDisplay" class="text-6xl font-mono font-bold text-[#1e3a8a] tracking-tighter">0.00</span>
        </div>
        <div class="flex-1 grid grid-cols-3 gap-px bg-gray-200">
            <button class="bg-white active:bg-blue-50 text-3xl font-medium" onclick="pressKey('1')">1</button>
            <button class="bg-white active:bg-blue-50 text-3xl font-medium" onclick="pressKey('2')">2</button>
            <button class="bg-white active:bg-blue-50 text-3xl font-medium" onclick="pressKey('3')">3</button>
            <button class="bg-white active:bg-blue-50 text-3xl font-medium" onclick="pressKey('4')">4</button>
            <button class="bg-white active:bg-blue-50 text-3xl font-medium" onclick="pressKey('5')">5</button>
            <button class="bg-white active:bg-blue-50 text-3xl font-medium" onclick="pressKey('6')">6</button>
            <button class="bg-white active:bg-blue-50 text-3xl font-medium" onclick="pressKey('7')">7</button>
            <button class="bg-white active:bg-blue-50 text-3xl font-medium" onclick="pressKey('8')">8</button>
            <button class="bg-white active:bg-blue-50 text-3xl font-medium" onclick="pressKey('9')">9</button>
            <button class="bg-red-50 text-red-600 text-3xl font-bold" onclick="pressClear()">C</button>
            <button class="bg-white active:bg-blue-50 text-3xl font-medium" onclick="pressKey('0')">0</button>
            <button class="bg-white active:bg-blue-50 text-3xl font-medium" onclick="pressKey('00')">00</button>
        </div>
        <button class="w-full bg-[#f97316] text-white font-bold py-7 text-2xl active:bg-[#ea580c]" onclick="createSale()">สร้างรายการขาย</button>
    </div>

    <div id="screen-qr" class="hidden flex-col h-full bg-black/40 items-center justify-center p-4 w-full">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-[400px] overflow-hidden flex flex-col relative">
            <div class="bg-[#f0f2f5] px-6 py-4 flex items-center border-b border-gray-100">
                <button onclick="cancelTransaction()" class="text-gray-400 p-2"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                <div class="flex-1 text-center pr-8">
                    <p class="text-[#4b5563] text-[13px] font-medium leading-tight">แคปภาพหน้าจอและสแกน QR<br>เพื่อชำระเงิน</p>
                </div>
            </div>
            
            <div class="p-8 flex flex-col items-center bg-white">
                <div class="border border-blue-100 rounded p-1 mb-6"><img src="src/promptpay.webp" class="h-6"></div>
                
                <div id="qr-container" class="cursor-pointer mb-6 border border-gray-100 p-2 rounded-2xl bg-white shadow-sm" onclick="printQR()">
                    <div class="w-[200px] h-[200px] flex items-center justify-center bg-gray-50 rounded-xl animate-pulse"><span class="text-gray-300 text-sm">กำลังเชื่อมต่อ...</span></div>
                </div>

                <div class="text-center mb-6">
                    <p class="text-gray-500 text-[13px] mb-1">ชำระเงินให้ ปุณชญารีสอร์ท</p>
                    <div class="flex items-baseline justify-center gap-1">
                        <span id="qr-amount" class="text-4xl font-bold text-gray-800">0.00</span>
                        <span class="text-lg font-medium text-gray-400">บาท</span>
                    </div>
                </div>

                <div class="bg-[#fffdf0] border border-yellow-100 rounded-xl py-4 px-3 w-full text-center mb-6">
                    <p class="text-[13px] text-gray-800 mb-1">ชำระเงินภายใน <span class="font-bold" id="expire-time">--:--, --/--/----</span></p>
                    <p class="text-[11px] text-gray-500">อย่าพึ่งกดปิด หน้านี้จะอัปเดตหลังชำระเงินเสร็จ</p>
                </div>
                
                <div class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-blue-50 rounded-2xl border border-blue-100">
                    <div class="loader rounded-full border-2 border-t-2 border-blue-400 h-4 w-4"></div>
                    <span class="text-blue-700 text-xs font-bold uppercase tracking-wider">ตรวจสอบยอดอัตโนมัติ...</span>
                </div>
            </div>
            
            <div class="p-4 bg-gray-50 border-t flex gap-2">
                <button class="flex-1 bg-white border py-3.5 rounded-xl text-sm font-bold text-gray-500" onclick="cancelTransaction()">ยกเลิก</button>
                <button class="flex-[2] bg-[#1e3a8a] text-white py-3.5 rounded-xl text-sm font-bold shadow-lg" onclick="verifyTransaction()">ตรวจสอบรายการ</button>
            </div>
        </div>
    </div>

    <script>
        let amountStr = "0";
        let pollingInterval, currentChargeId = null;

        function pressKey(k) { if (amountStr.length < 8) { amountStr = amountStr === "0" ? k : amountStr + k; updateDisplay(); } }
        function pressClear() { amountStr = "0"; updateDisplay(); }
        function updateDisplay() { document.getElementById('amountDisplay').innerText = (parseInt(amountStr, 10)/100).toFixed(2); }
        
        function switchScreen(id) { 
            ['screen-keypad', 'screen-qr', 'screen-receipt', 'screen-failed'].forEach(s => {
                const el = document.getElementById(s); if(el) { el.classList.add('hidden'); el.classList.remove('flex'); }
            });
            const target = document.getElementById(id); if(target) { target.classList.remove('hidden'); target.classList.add('flex'); }
        }

        async function createSale() {
            let val = parseInt(amountStr, 10);
            if (val < 2000) return alert("ยอดชำระขั้นต่ำคือ 20.00 บาท"); // Beam ขั้นต่ำ 20 บาท
            
            let displayAmt = (val/100).toFixed(2);
            document.getElementById('qr-amount').innerText = displayAmt;
            switchScreen('screen-qr');
            
            let exp = new Date(); exp.setMinutes(exp.getMinutes() + 5);
            const pad = (n) => String(n).padStart(2, '0');
            document.getElementById('expire-time').innerText = `${pad(exp.getHours())}:${pad(exp.getMinutes())}, ${pad(exp.getDate())}/${pad(exp.getMonth()+1)}/${exp.getFullYear()+543}`;

            try {
                const res = await fetch("/api/create-charge", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ amount: val, currency: "THB", paymentMethod: "PROMPTPAY" })
                });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error);

                currentChargeId = data.id;
                document.getElementById('qr-container').innerHTML = `<img src="${data.qrCodeUrl}" class="w-full h-full object-contain rounded-xl">`;
                pollingInterval = setInterval(() => checkStatus(false), 3000);
            } catch (e) { 
                alert("ผิดพลาด: " + e.message);
                cancelTransaction();
            }
        }

        async function checkStatus(manual) {
            if (!currentChargeId) return;
            try {
                const res = await fetch(`/api/check-status?id=${currentChargeId}`);
                const data = await res.json();
                if (data.status === 'successful' || data.status === 'paid' || data.status === 'succeeded') {
                    success(data.id);
                } else if (manual) {
                    alert("ยังไม่พบยอดชำระ กรุณาตรวจสอบอีกครั้ง");
                }
            } catch (e) {}
        }

        function success(id) {
            clearInterval(pollingInterval);
            switchScreen('screen-receipt'); // ใส่ข้อมูลสำเร็จเหมือนเดิม
        }

        function cancelTransaction() { 
            clearInterval(pollingInterval); amountStr="0"; updateDisplay(); 
            document.getElementById('qr-container').innerHTML = `<div class="w-[200px] h-[200px] flex items-center justify-center bg-gray-50 rounded-xl animate-pulse"><span class="text-gray-300 text-sm">กำลังเชื่อมต่อ...</span></div>`;
            switchScreen('screen-keypad'); 
        }
        function verifyTransaction() { checkStatus(true); }
        function printQR() { window.print(); }
        function printReceipt() { window.print(); }
        function resetApp() { cancelTransaction(); }
    </script>
</body>
</html>
